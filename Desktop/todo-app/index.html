<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Todo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>My Todo</h1>
      <p id="date"></p>
      <div class="input-box">
        <input type="text" id="todoInput" placeholder="할 일을 입력하세요" />

        <button id="addBtn">추가</button>
      </div>
      <ul id="todoList"></ul>
      <p id="count">남은 할 일:0개</p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
